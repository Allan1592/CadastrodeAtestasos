name: Sistema_Offline_Allan

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Baixando seu Codigo
        uses: actions/checkout@v4

      - name: 2. Preparando o Motor (NWJS)
        run: |
          curl -L https://dl.nwjs.io/v0.82.0/nwjs-v0.82.0-win-x64.zip -o motor.zip
          Expand-Archive -Path motor.zip -DestinationPath .
          Rename-Item -Path nwjs-v0.82.0-win-x64 -NewName "SISTEMA_OFFLINE"

      - name: 3. Juntando tudo automaticamente
        run: |
          # Aqui eu mando ele ignorar os nomes e copiar TUDO o que for arquivo
          Get-ChildItem -File -Recurse | Copy-Item -Destination "SISTEMA_OFFLINE" -ErrorAction SilentlyContinue

      - name: 4. Criar link para baixar
        uses: actions/upload-artifact@v4
        with:
          name: Gestao_Atestados_Allan
          path: SISTEMA_OFFLINE/
